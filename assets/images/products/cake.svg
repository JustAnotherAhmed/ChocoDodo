<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg-k" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </radialGradient>
    <linearGradient id="cake-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C39E"/>
      <stop offset="100%" stop-color="#B07A4F"/>
    </linearGradient>
    <linearGradient id="cake-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAD3D3"/>
      <stop offset="100%" stop-color="#F08C8C"/>
    </linearGradient>
    <linearGradient id="cake-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </linearGradient>
    <filter id="shadow-k" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feFlood flood-color="#3E2723" flood-opacity="0.22"/>
      <feComposite in2="off" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg-k)"/>
  <ellipse cx="200" cy="265" rx="140" ry="12" fill="#3E2723" opacity="0.18"/>

  <g filter="url(#shadow-k)">
    <!-- plate -->
    <ellipse cx="200" cy="255" rx="135" ry="14" fill="#fff"/>
    <ellipse cx="200" cy="252" rx="135" ry="11" fill="#F5E6D3"/>

    <!-- bottom tier -->
    <ellipse cx="200" cy="245" rx="120" ry="14" fill="#8B5A3C"/>
    <rect x="80" y="195" width="240" height="55" fill="url(#cake-base)"/>
    <ellipse cx="200" cy="195" rx="120" ry="14" fill="url(#cake-mid)"/>
    <!-- drips bottom tier -->
    <path d="M 80 230 L 80 250 Q 90 245 95 250 L 95 235 Q 105 240 110 230 L 110 250 Q 120 245 125 250 L 125 230 Q 135 240 140 230 L 140 250 Q 150 245 155 250 L 155 235 Q 165 240 170 230 L 170 250 Q 180 245 185 250 L 185 235 Q 195 240 200 230 L 200 250 Q 210 245 215 250 L 215 235 Q 225 240 230 230 L 230 250 Q 240 245 245 250 L 245 235 Q 255 240 260 230 L 260 250 Q 270 245 275 250 L 275 235 Q 285 240 290 230 L 290 250 Q 300 245 305 250 L 305 235 Q 315 240 320 230 L 320 250 Z" fill="#8B5A3C" opacity="0"/>

    <!-- middle tier -->
    <ellipse cx="200" cy="195" rx="90" ry="11" fill="#6B4423"/>
    <rect x="110" y="150" width="180" height="48" fill="url(#cake-mid)"/>
    <ellipse cx="200" cy="150" rx="90" ry="11" fill="url(#cake-top)"/>
    <!-- pink drips -->
    <path d="M 115 158 Q 118 168 122 158 Q 130 175 140 158 Q 148 170 158 158 Q 168 175 178 158 Q 190 172 200 158 Q 212 174 222 158 Q 232 172 242 158 Q 252 175 262 158 Q 272 168 282 158 Q 287 168 290 158 L 290 165 L 115 165 Z" fill="#F08C8C"/>

    <!-- top tier -->
    <ellipse cx="200" cy="150" rx="60" ry="8" fill="#A37A5A"/>
    <rect x="140" y="115" width="120" height="38" fill="url(#cake-base)"/>
    <ellipse cx="200" cy="115" rx="60" ry="8" fill="url(#cake-top)"/>

    <!-- candle -->
    <rect x="195" y="80" width="10" height="38" fill="#fff" stroke="#F08C8C" stroke-width="1"/>
    <rect x="195" y="90" width="10" height="3" fill="#F08C8C"/>
    <rect x="195" y="100" width="10" height="3" fill="#F08C8C"/>
    <!-- flame -->
    <path d="M 200 60 Q 192 70 195 80 Q 200 75 205 80 Q 208 70 200 60 Z" fill="#FFD54F"/>
    <ellipse cx="200" cy="76" rx="2" ry="4" fill="#FF6F00"/>

    <!-- sprinkles on tiers -->
    <rect x="160" y="125" width="10" height="3" rx="1.5" fill="#A8DADC" transform="rotate(20 165 127)"/>
    <rect x="220" y="130" width="10" height="3" rx="1.5" fill="#D4AF37" transform="rotate(-30 225 132)"/>
    <rect x="180" y="172" width="10" height="3" rx="1.5" fill="#5DADE2" transform="rotate(45 185 174)"/>
    <rect x="240" y="178" width="10" height="3" rx="1.5" fill="#D4AF37" transform="rotate(-20 245 180)"/>
    <rect x="120" y="218" width="10" height="3" rx="1.5" fill="#F5B7B1" transform="rotate(15 125 220)"/>
    <rect x="270" y="220" width="10" height="3" rx="1.5" fill="#A8DADC" transform="rotate(-40 275 222)"/>
  </g>

  <!-- decorations -->
  <circle cx="60" cy="60" r="6" fill="#F5B7B1" opacity="0.6"/>
  <circle cx="350" cy="50" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="40" cy="170" r="5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="370" cy="200" r="6" fill="#C2185B" opacity="0.5"/>
  <g transform="translate(50 100)" fill="#D4AF37">
    <path d="M0 -8 L1.5 -1.5 L8 0 L1.5 1.5 L0 8 L-1.5 1.5 L-8 0 L-1.5 -1.5 Z"/>
  </g>
  <g transform="translate(360 130)" fill="#F5B7B1">
    <path d="M0 -8 L1.5 -1.5 L8 0 L1.5 1.5 L0 8 L-1.5 1.5 L-8 0 L-1.5 -1.5 Z"/>
  </g>
</svg>
