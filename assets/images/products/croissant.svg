<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg-cr" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </radialGradient>
    <linearGradient id="cr-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4C97B"/>
      <stop offset="50%" stop-color="#D49A4A"/>
      <stop offset="100%" stop-color="#A06820"/>
    </linearGradient>
    <linearGradient id="cr-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow-cr" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feFlood flood-color="#3E2723" flood-opacity="0.22"/>
      <feComposite in2="off" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg-cr)"/>
  <ellipse cx="200" cy="245" rx="140" ry="14" fill="#3E2723" opacity="0.18"/>

  <g filter="url(#shadow-cr)">
    <!-- main crescent body -->
    <path d="M 70 175
             C 70 110 130 80 200 90
             C 270 80 330 110 330 175
             C 300 165 270 170 250 180
             C 230 170 210 175 200 180
             C 190 175 170 170 150 180
             C 130 170 100 165 70 175 Z"
          fill="url(#cr-grad)"/>

    <!-- segment ridges -->
    <path d="M 100 110 Q 110 130 105 165" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 135 95 Q 140 125 135 170" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 170 88 Q 173 125 170 175" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 205 88 Q 205 125 205 178" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 240 88 Q 240 125 240 175" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 275 95 Q 273 125 275 170" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 305 110 Q 305 130 305 165" stroke="#7A4A1A" stroke-width="2" fill="none" opacity="0.5"/>

    <!-- flaky highlights -->
    <path d="M 80 130 Q 90 125 95 135 Q 90 140 82 138 Z" fill="#F8DDA5" opacity="0.7"/>
    <path d="M 120 110 Q 132 105 137 115 Q 130 122 120 118 Z" fill="#F8DDA5" opacity="0.6"/>
    <path d="M 165 100 Q 178 95 184 105 Q 178 113 165 110 Z" fill="#F8DDA5" opacity="0.6"/>
    <path d="M 215 100 Q 228 95 234 105 Q 228 113 215 110 Z" fill="#F8DDA5" opacity="0.6"/>
    <path d="M 260 105 Q 273 100 280 110 Q 273 118 260 115 Z" fill="#F8DDA5" opacity="0.6"/>
    <path d="M 300 125 Q 312 120 318 130 Q 310 138 300 135 Z" fill="#F8DDA5" opacity="0.6"/>

    <!-- top shine band -->
    <path d="M 80 110 C 130 80 270 80 320 110 L 315 130 C 270 100 130 100 85 130 Z"
          fill="url(#cr-shine)" opacity="0.5"/>

    <!-- crispy edges (small bumps) -->
    <circle cx="72" cy="170" r="6" fill="#A06820"/>
    <circle cx="328" cy="170" r="6" fill="#A06820"/>

    <!-- darker shadow underside -->
    <path d="M 80 175 Q 200 200 320 175 L 320 185 Q 200 215 80 185 Z" fill="#7A4A1A" opacity="0.3"/>
  </g>

  <!-- flake crumbs -->
  <path d="M 50 220 Q 55 215 60 220 Q 55 225 50 220" fill="#D49A4A"/>
  <path d="M 340 230 Q 345 225 350 230 Q 345 235 340 230" fill="#D49A4A"/>
  <circle cx="60" cy="200" r="2" fill="#D49A4A"/>
  <circle cx="340" cy="210" r="2" fill="#D49A4A"/>

  <!-- decorations -->
  <circle cx="55" cy="60" r="5" fill="#F5B7B1" opacity="0.6"/>
  <circle cx="345" cy="55" r="5" fill="#A8DADC" opacity="0.6"/>
  <circle cx="35" cy="160" r="4" fill="#D4AF37" opacity="0.6"/>
  <circle cx="370" cy="135" r="5" fill="#C2185B" opacity="0.5"/>
  <g transform="translate(50 100)" fill="#D4AF37">
    <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z"/>
  </g>
  <g transform="translate(360 90)" fill="#F5B7B1">
    <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z"/>
  </g>
</svg>
