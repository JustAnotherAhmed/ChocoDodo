<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="bg-m" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </radialGradient>
    <radialGradient id="pink-shell" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FAD3D3"/>
      <stop offset="100%" stop-color="#F08C8C"/>
    </radialGradient>
    <radialGradient id="mint-shell" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#C8EAEB"/>
      <stop offset="100%" stop-color="#7FBEC0"/>
    </radialGradient>
    <radialGradient id="gold-shell" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#F4D58A"/>
      <stop offset="100%" stop-color="#C9962E"/>
    </radialGradient>
    <filter id="shadow-m" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="5" result="off"/>
      <feFlood flood-color="#3E2723" flood-opacity="0.2"/>
      <feComposite in2="off" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg-m)"/>

  <!-- macaron template definition -->
  <symbol id="macaron" viewBox="0 0 140 100">
    <!-- bottom shell -->
    <ellipse cx="70" cy="68" rx="60" ry="22" fill="currentColor"/>
    <!-- ruffles (feet) bottom -->
    <g fill="currentColor" opacity="0.7">
      <circle cx="20" cy="72" r="4"/><circle cx="32" cy="76" r="4"/>
      <circle cx="44" cy="78" r="4"/><circle cx="56" cy="79" r="4"/>
      <circle cx="68" cy="80" r="4"/><circle cx="80" cy="79" r="4"/>
      <circle cx="92" cy="78" r="4"/><circle cx="104" cy="76" r="4"/>
      <circle cx="116" cy="72" r="4"/>
    </g>
    <!-- cream filling -->
    <ellipse cx="70" cy="50" rx="56" ry="9" fill="#FFF8E7"/>
    <!-- top shell -->
    <ellipse cx="70" cy="33" rx="60" ry="22" fill="currentColor"/>
    <!-- ruffles top -->
    <g fill="currentColor" opacity="0.7">
      <circle cx="20" cy="29" r="4"/><circle cx="32" cy="25" r="4"/>
      <circle cx="44" cy="23" r="4"/><circle cx="56" cy="22" r="4"/>
      <circle cx="68" cy="21" r="4"/><circle cx="80" cy="22" r="4"/>
      <circle cx="92" cy="23" r="4"/><circle cx="104" cy="25" r="4"/>
      <circle cx="116" cy="29" r="4"/>
    </g>
    <!-- shine -->
    <ellipse cx="50" cy="22" rx="22" ry="6" fill="#fff" opacity="0.4"/>
  </symbol>

  <!-- shadows -->
  <ellipse cx="100" cy="200" rx="60" ry="8" fill="#3E2723" opacity="0.15"/>
  <ellipse cx="220" cy="240" rx="65" ry="9" fill="#3E2723" opacity="0.15"/>
  <ellipse cx="320" cy="180" rx="58" ry="8" fill="#3E2723" opacity="0.15"/>

  <!-- three macarons (back-left, front-center, back-right) -->
  <g transform="translate(40 130) rotate(-8)" color="url(#mint-shell)" filter="url(#shadow-m)">
    <use href="#macaron" width="140" height="100"/>
  </g>
  <g transform="translate(260 110) rotate(10)" color="url(#gold-shell)" filter="url(#shadow-m)">
    <use href="#macaron" width="140" height="100"/>
  </g>
  <g transform="translate(150 165) rotate(-3) scale(1.1)" color="url(#pink-shell)" filter="url(#shadow-m)">
    <use href="#macaron" width="140" height="100"/>
  </g>

  <!-- pearls / decorations -->
  <circle cx="60" cy="60" r="6" fill="#fff" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="350" cy="70" r="5" fill="#fff" stroke="#D4AF37" stroke-width="1"/>
  <circle cx="40" cy="240" r="5" fill="#F5B7B1" opacity="0.7"/>
  <circle cx="370" cy="260" r="6" fill="#A8DADC" opacity="0.7"/>
  <!-- sparkle -->
  <g transform="translate(370 50)" fill="#D4AF37">
    <path d="M0 -10 L2 -2 L10 0 L2 2 L0 10 L-2 2 L-10 0 L-2 -2 Z"/>
  </g>
  <g transform="translate(30 180)" fill="#F5B7B1">
    <path d="M0 -8 L1.5 -1.5 L8 0 L1.5 1.5 L0 8 L-1.5 1.5 L-8 0 L-1.5 -1.5 Z"/>
  </g>
</svg>
