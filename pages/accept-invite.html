<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="icon" type="image/jpg" href="../assets/images/logo.jpg" />
  <script src="../assets/themes.js"></script>
  <script src="../assets/i18n.js"></script>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <img src="../assets/images/logo.jpg" alt="ChocoDoDo" onerror="this.onerror=null;this.src='../assets/images/logo.svg';" />
      <span class="nav-brand">Choco<em>DoDo</em></span>
    </a>
  </div>
</nav>

<main id="main" class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="section-eyebrow">Welcome to the team · <span lang="ar" dir="rtl">أهلاً بك</span></span>
      <h1>Accept your invitation</h1>
      <p id="ai_intro">Loading invitation…</p>
    </div>

    <form id="acceptInviteForm" class="auth-form" style="display:none;">
      <label class="form-field">
        <span>Email</span>
        <input id="ai_email" type="email" disabled />
      </label>
      <label class="form-field">
        <span>Your name</span>
        <input id="ai_name" type="text" required />
      </label>
      <label class="form-field">
        <span>Pick a password (min 8 characters)</span>
        <input id="ai_password" type="password" required minlength="8" autocomplete="new-password" />
      </label>
      <label class="form-field">
        <span>Confirm password</span>
        <input id="ai_confirm" type="password" required minlength="8" autocomplete="new-password" />
      </label>
      <div class="auth-error" id="ai_error" role="alert" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-block">Accept & sign in</button>
    </form>

    <div id="ai_invalid" style="display:none; text-align:center; padding:24px;">
      <div style="font-size:3rem;">⚠️</div>
      <h2 style="font-family:'Fredoka',sans-serif;color:var(--choc-deep);margin:12px 0;">Invitation invalid</h2>
      <p id="ai_invalid_msg" class="muted">The link may have expired or already been used.</p>
      <a href="../index.html" class="btn btn-ghost" style="margin-top:16px;">Back to home</a>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="../assets/auth-pages.js"></script>
</body>
</html>
