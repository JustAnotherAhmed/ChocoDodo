<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="icon" type="image/jpg" href="../assets/images/logo.jpg" />
  <script src="../assets/themes.js"></script>
  <script src="../assets/i18n.js"></script>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <img src="../assets/images/logo.jpg" alt="ChocoDoDo" onerror="this.onerror=null;this.src='../assets/images/logo.svg';" />
      <span class="nav-brand">Choco<em>DoDo</em></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html" class="nav-link">Home</a></li>
      <li><a href="login.html" class="nav-link">Sign in</a></li>
    </ul>
  </div>
</nav>

<main id="main" class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="section-eyebrow">New password · <span lang="ar" dir="rtl">باسورد جديد</span></span>
      <h1>Pick a new password</h1>
      <p>At least 8 characters. Choose something memorable but strong.</p>
    </div>
    <form id="resetForm" class="auth-form">
      <label class="form-field">
        <span>New password</span>
        <input id="rp_new" type="password" required minlength="8" autocomplete="new-password" />
      </label>
      <label class="form-field">
        <span>Confirm new password</span>
        <input id="rp_confirm" type="password" required minlength="8" autocomplete="new-password" />
      </label>
      <div class="auth-error" id="rp_error" role="alert" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-block">Set new password</button>
    </form>
    <div id="rp_done" style="display:none;text-align:center;padding:24px;">
      <div style="font-size:3rem;">✅</div>
      <h2 style="font-family:'Fredoka',sans-serif;color:var(--choc-deep);margin:12px 0;">Password updated</h2>
      <p>You can now sign in with your new password.</p>
      <a href="login.html" class="btn btn-primary" style="margin-top:16px;">Go to sign in</a>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="../assets/auth-pages.js"></script>
</body>
</html>
