<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="icon" type="image/jpg" href="../assets/images/logo.jpg" />
  <script src="../assets/themes.js"></script>
  <script src="../assets/i18n.js"></script>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <img src="../assets/images/logo.jpg" alt="ChocoDoDo" onerror="this.onerror=null;this.src='../assets/images/logo.svg';" />
      <span class="nav-brand">Choco<em>DoDo</em></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html" class="nav-link">Home</a></li>
      <li><a href="../menu.html" class="nav-link">Menu</a></li>
      <li><a href="signup.html" class="nav-link">Sign Up</a></li>
    </ul>
  </div>
</nav>

<main id="main" class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="section-eyebrow">Welcome back · <span lang="ar" dir="rtl">أهلاً بعودتك</span></span>
      <h1>Sign in</h1>
      <p>Track your orders, save favorites, and check out faster.</p>
    </div>
    <form id="loginForm" class="auth-form">
      <label class="form-field">
        <span>Email</span>
        <input id="li_email" type="email" required autocomplete="email" />
      </label>
      <label class="form-field">
        <span>Password</span>
        <input id="li_password" type="password" required autocomplete="current-password" />
      </label>

      <!-- Revealed only when the account has 2FA enabled. JS toggles .hidden. -->
      <div id="li_totp_wrap" class="form-field hidden">
        <label for="li_totp">
          <span>🛡️ Two-factor code</span>
          <input id="li_totp" type="text" inputmode="numeric" maxlength="6"
                 pattern="[0-9]{6}" autocomplete="one-time-code"
                 placeholder="6-digit code" />
        </label>
        <small class="form-hint">From your authenticator app (Google Authenticator, Authy, 1Password, etc.).</small>
      </div>

      <div class="auth-error" id="li_error" role="alert" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-block">
        <span>Sign In</span>
      </button>
      <p class="auth-alt"><a href="forgot-password.html">Forgot your password?</a></p>
      <p class="auth-alt">No account yet? <a href="signup.html">Create one</a></p>
    </form>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="../assets/auth-pages.js"></script>
</body>
</html>
